<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" width="100%" role="img" aria-label="SideQuest – Hyper-local task marketplace banner">

  <!-- Flat dark background -->
  <rect width="900" height="200" fill="#0d1117"/>

  <!-- Subtle grid -->
  <g stroke="#ffffff" stroke-width="1" opacity="0.04">
    <line x1="0"   y1="50"  x2="900" y2="50"/>
    <line x1="0"   y1="100" x2="900" y2="100"/>
    <line x1="0"   y1="150" x2="900" y2="150"/>
    <line x1="150" y1="0"   x2="150" y2="200"/>
    <line x1="300" y1="0"   x2="300" y2="200"/>
    <line x1="450" y1="0"   x2="450" y2="200"/>
    <line x1="600" y1="0"   x2="600" y2="200"/>
    <line x1="750" y1="0"   x2="750" y2="200"/>
  </g>

  <!-- Decorative accent shapes (flat, no gradients) -->
  <rect x="820" y="20"  width="60" height="60" rx="4" fill="#F59E0B" opacity="0.06"/>
  <rect x="840" y="120" width="40" height="40" rx="4" fill="#2563EB" opacity="0.07"/>
  <circle cx="860" cy="180" r="30" fill="#10B981" opacity="0.05"/>

  <!-- Small dot accents top-left -->
  <circle cx="28" cy="28" r="3" fill="#F59E0B" opacity="0.35"/>
  <circle cx="42" cy="36" r="2" fill="#10B981" opacity="0.35"/>
  <circle cx="32" cy="48" r="2" fill="#2563EB" opacity="0.35"/>

  <!-- Map pin icon -->
  <g transform="translate(50, 52)">
    <path d="M22 2 C11 2 2 11 2 22 C2 37 22 54 22 54 C22 54 42 37 42 22 C42 11 33 2 22 2Z" fill="#F59E0B"/>
    <circle cx="22" cy="22" r="9" fill="#0d1117"/>
    <circle cx="22" cy="22" r="4" fill="#F59E0B"/>
  </g>

  <!-- Title -->
  <text x="112" y="94"
    font-family="system-ui, -apple-system, monospace"
    font-size="58" font-weight="800" fill="#F59E0B">SideQuest</text>

  <!-- Tagline -->
  <text x="114" y="122"
    font-family="system-ui, -apple-system, monospace"
    font-size="15" font-weight="400" fill="#8B949E">
    Hyper-local task marketplace · connect, earn, and help your neighbours
  </text>

  <!-- Tech stack badge pills -->
  <rect x="114" y="142" width="72"  height="24" rx="12" fill="#21262d"/>
  <text x="150" y="158" font-family="system-ui, -apple-system, monospace" font-size="11" fill="#FCD34D" text-anchor="middle">Firebase</text>

  <rect x="196" y="142" width="88"  height="24" rx="12" fill="#21262d"/>
  <text x="240" y="158" font-family="system-ui, -apple-system, monospace" font-size="11" fill="#93C5FD" text-anchor="middle">MapLibre GL</text>

  <rect x="294" y="142" width="80"  height="24" rx="12" fill="#21262d"/>
  <text x="334" y="158" font-family="system-ui, -apple-system, monospace" font-size="11" fill="#6EE7B7" text-anchor="middle">Vanilla JS</text>

  <rect x="384" y="142" width="90"  height="24" rx="12" fill="#21262d"/>
  <text x="429" y="158" font-family="system-ui, -apple-system, monospace" font-size="11" fill="#A5B4FC" text-anchor="middle">Tailwind CSS</text>

  <rect x="484" y="142" width="84"  height="24" rx="12" fill="#21262d"/>
  <text x="526" y="158" font-family="system-ui, -apple-system, monospace" font-size="11" fill="#FDA4AF" text-anchor="middle">Firestore</text>

  <rect x="578" y="142" width="48"  height="24" rx="12" fill="#21262d"/>
  <text x="602" y="158" font-family="system-ui, -apple-system, monospace" font-size="11" fill="#C4B5FD" text-anchor="middle">MIT</text>

  <!-- Right-side decorative lines -->
  <line x1="808" y1="78"  x2="858" y2="78"  stroke="#F59E0B" stroke-width="2" opacity="0.4"/>
  <line x1="798" y1="93"  x2="858" y2="93"  stroke="#2563EB" stroke-width="2" opacity="0.4"/>
  <line x1="814" y1="108" x2="858" y2="108" stroke="#10B981" stroke-width="2" opacity="0.4"/>

</svg>
